     role="img"
     aria-label="m logo">

  <style>
    :root {
      /* Light Mode Defaults */
      --m-bg-color: #faf8f8; /* White background */
      --m-fg-color: #000000; /* Black M */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Dark Mode Overrides */
        --m-bg-color: #373534; /* Black background */
        --m-fg-color: #ffffff; /* White X */
      }
    }

    .m-logo-bg {
      fill: var(--m-bg-color);
    }
    .m-logo-fg {
      fill: var(--m-fg-color);
    }
  </style>

